<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Download Progress UI</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card {
            width: 340px;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #e0e6ed;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .progress-container {
            width: 100%;
            height: 12px;
            background: #e6ecf3;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007bff, #0056b3);
            border-radius: 20px;
            transition: width 0.3s ease;
        }
        
        .percent {
            font-size: 14px;
            color: #000;
            margin-bottom: 20px;
        }
        
        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="title">Downloading File</div>
        <div class="subtitle">Project_Report.pdf</div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="percent" id="percentText">0%</div>

        <button class="btn" id="startBtn">Start Download</button>
    </div>
    <script src="script.js"></script>

</body>

</html>
